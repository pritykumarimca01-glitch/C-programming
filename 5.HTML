<!DOCTYPE html>
<html>
<head>
    <title>Styled Web Page</title>

    <!-- Internal CSS -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        .container {
            display: flex;
            padding: 20px;
        }

        .content {
            width: 70%;
            padding: 20px;
        }

        .content img {
            width: 20%;
            border-radius: 10px;
        }

        .sidebar {
            width: 30%;
            background-color: #e6e6e6;
            padding: 20px;
        }

        footer {
            background-color: #222;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>

</head>
<body>

<header>
    <h1>My Stylish Web Page</h1>
    <p>Welcome to my website</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<div class="container">

    <div class="content">
        <h2>Main Content</h2>
        <p>This is a paragraph aligned with an image.</p>
        <img src="https://plus.unsplash.com/premium_photo-1676070095982-bcd632341498?q=80&w=688&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Sample Image">
    </div>

    <div class="sidebar">
        <h3>Sidebar</h3>
        <p>Additional information goes here.</p>
    </div>

</div>

<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
