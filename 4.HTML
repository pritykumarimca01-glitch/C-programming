<!DOCTYPE html>
<html>
<head>
    <title>Frames with Image and Video</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #9face6);
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            background-color: #333;
            color: white;
            padding: 15px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
        }

        .box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        iframe {
            border-radius: 10px;
            border: none;
        }

        h2 {
            color: #444;
        }
    </style>
</head>

<body>

<h1>Using Frames (iframe) for Image & Video</h1>

<div class="container">

    <!-- Image Frame -->
    <div class="box">
        <h2>Image Frame</h2>
        <iframe src="https://images.unsplash.com/photo-1566669086984-077347c1f4bb?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8YmVhdXRpZnVsJTIwZmxvd2VyfGVufDB8fDB8fHww" alt="Sample Image 3" width="400" height="250"></iframe>
    </div>

    <!-- Video Frame -->
    <div class="box">
        <h2>Video Frame</h2>
        <iframe width="400" height="250" 
        src="https://www.youtube.com/embed/tgbNymZ7vqY">
        </iframe>
    </div>

</div>

</body>
</html>
